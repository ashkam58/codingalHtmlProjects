<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <!-- Importing modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* Premium Cinematic Styling */
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Glassmorphism Form Container */
        form {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 16px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 500px;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        form:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6);
        }

        fieldset {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 25px 20px;
        }

        legend {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ffecd2;
            padding: 0 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #e0e0e0;
            font-weight: 300;
        }

        /* Input styling */
        .form-group input:not([type="radio"]):not([type="file"]),
        .form-group textarea {
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:not([type="radio"]):not([type="file"]):focus,
        .form-group textarea:focus {
            border-color: #ffecd2;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 10px rgba(255, 236, 210, 0.3);
        }

        /* Radio Buttons */
        .radio-group {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-top: 5px;
        }

        .radio-group label {
            font-size: 0.95rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            cursor: pointer;
        }

        /* File Upload */
        .file-upload {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed rgba(255, 255, 255, 0.4);
            color: #ddd;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .file-upload:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Buttons */
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        input[type="submit"], input[type="reset"] {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        input[type="submit"] {
            background: linear-gradient(135deg, #fcb045, #fd1d1d);
            color: white;
            box-shadow: 0 4px 15px rgba(253, 29, 29, 0.4);
        }

        input[type="submit"]:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(253, 29, 29, 0.6);
        }

        input[type="reset"] {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        input[type="reset"]:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffffff;
        }
    </style>
</head>
<body>

    <form action="#" method="POST">
        <!-- Fieldset enclosing the form -->
        <fieldset>
            <!-- Legend label -->
            <legend>Personal Information</legend>

            <div class="form-group">
                <label for="fname">First Name:</label>
                <input type="text" id="fname" name="fname" placeholder="Enter your first name" required>
            </div>

            <div class="form-group">
                <label for="lname">Last Name:</label>
                <input type="text" id="lname" name="lname" placeholder="Enter your last name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" placeholder="Create a secure password" required>
            </div>

            <div class="form-group">
                <label>Gender:</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="male" required> Male</label>
                    <label><input type="radio" name="gender" value="female"> Female</label>
                    <label><input type="radio" name="gender" value="other"> Other</label>
                </div>
            </div>

            <div class="form-group">
                <label for="birthday">Birthday:</label>
                <input type="date" id="birthday" name="birthday" required>
            </div>

            <div class="form-group">
                <label for="address">Full Address:</label>
                <textarea id="address" name="address" rows="3" placeholder="Enter your complete address..." required></textarea>
            </div>

            <div class="form-group">
                <label for="profile_pic">Profile Picture:</label>
                <input type="file" id="profile_pic" name="profile_pic" accept="image/*" class="file-upload">
            </div>

            <div class="buttons">
                <!-- Submit and Reset Buttons -->
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
            </div>

        </fieldset>
    </form>

</body>
</html>
