<!DOCTYPE html>
<html>
<head>
    <!-- Head section -->
    <title>After Class Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #ffffff;
            margin: 0;
            padding: 50px;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .content {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.4);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            color: #4facfe;
            text-align: center;
            font-size: 2.5rem;
            margin-top: 0;
        }
        h2 {
            color: #a8c0ff;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background: rgba(255, 255, 255, 0.05);
            margin: 10px 0;
            padding: 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
            border-left: 4px solid #4facfe;
        }
        li:hover {
            transform: translateX(10px);
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid #00f2fe;
        }
    </style>
</head>
<body>
    <!-- Main content -->
    <div class="content">
        <h1>My First Webpage</h1>
        <p>This page demonstrates the document structure using headings, paragraphs, and lists as part of the After Class Project.</p>
        
        <h2>Why learn HTML?</h2>
        <ul>
            <li>It is the foundation of the web</li>
            <li>Allows you to structure your content effectively</li>
            <li>Works perfectly alongside CSS and JavaScript</li>
        </ul>
    </div>
</body>
</html>
