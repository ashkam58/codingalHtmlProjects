<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity 3 - Words That Inspire</title>
    <style>
        body { font-family: sans-serif; background: #111827; color: #f3f4f6; margin: 40px auto; max-width: 800px; padding: 20px; }
        .card { background: #1f2937; padding: 30px; border-radius: 12px; font-size: 1.2rem; }
        q { color: #a78bfa; font-style: italic; }
        blockquote { background: rgba(56,189,248,0.1); border-left: 4px solid #38bdf8; padding: 15px; font-style: italic; color: #e0f2fe; }
    </style>
</head>
<body>
    <div class="card">
        <p>Albert Einstein said, <q>Imagination is more important than knowledge.</q></p>
        <p>Steve Jobs said:</p>
        <blockquote>"Your work is going to fill a large part of your life, and the only way to be truly satisfied is to do what you believe is great work."</blockquote>
    </div>
</body>
</html>
