<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity 2 - Aquatic Beats Party</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111827; color: #f3f4f6; margin: 40px auto; max-width: 800px; padding: 20px; text-align: center; }
        .card { background: #1f2937; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1, h2 { color: #34d399; }
        video { border: 2px solid #374151; border-radius: 8px; max-width: 100%; margin-top: 10px; }
        audio { width: 100%; margin-bottom: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Aquatic Beats Party</h1>
        
        <h2>Party Soundtrack</h2>
        <audio controls loop>
            <source src="music.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
        
        <h2>Underwater Dance Floor</h2>
        <video controls loop poster="poster.png" width="600" height="400">
            <source src="aqua.mp4" type="video/mp4">
            Your browser does not support the video element.
        </video>
    </div>
</body>
</html>
