<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity 1 - Rocket Mission Gallery</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111827; color: #f3f4f6; margin: 40px auto; max-width: 800px; padding: 20px; text-align: center; }
        .card { background: #1f2937; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { color: #60a5fa; }
        img { border: 2px solid #374151; border-radius: 8px; margin: 10px; transition: transform 0.3s; }
        img:hover { transform: scale(1.05); border-color: #60a5fa; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Rocket Mission Gallery</h1>
        <p>Welcome to the official mission briefing.</p>
        <!-- Center tag used as requested -->
        <center>
            <img src="rocket.png" alt="A rocket ready to launch" width="350" height="350">
            <br>
            <img src="planet.png" alt="A beautiful alien planet" width="350" height="350">
            <br>
            <img src="astronaut.png" alt="An astronaut floating in space" width="350" height="350">
        </center>
    </div>
</body>
</html>
