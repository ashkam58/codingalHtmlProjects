<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Head section: Contains metadata, fonts, and styling -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me - Activity 1</title>
    <!-- Premium aesthetic styling -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a40);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 50px 60px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }
        .container:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }
        h1 {
            color: #a8c0ff;
            margin-top: 0;
            font-size: 2.8rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #e2e8f0;
            margin: 0;
        }
    </style>
</head>
<body>
    <!-- Main content: This is the visible section of the webpage -->
    <div class="container">
        <h1>About Me</h1>
        <p>
            Hello, I am Ashkam.<br>
            I am mastering HTML to build cinematic and high-quality web applications!
        </p>
    </div>
</body>
</html>
