<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity 1 - Semantics</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; color: #1e293b; margin: 0; }
        .wrapper { max-width: 900px; margin: 0 auto; background: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header { background: #2563eb; color: #fff; padding: 20px; text-align: center; }
        nav { background: #1e293b; padding: 10px; text-align: center; } nav a { color: #fff; margin: 0 10px; }
        main { padding: 20px; display: flex; gap: 20px; }
        section { flex: 3; } aside { flex: 1; background: #f8fafc; padding: 15px; border: 1px solid #e2e8f0; }
        article { background: #f1f5f9; padding: 15px; margin-bottom: 15px; border-left: 4px solid #2563eb; }
        figure { margin: 0; text-align: center; } figcaption { font-style: italic; color: #64748b; }
        footer { background: #1e293b; color: #94a3b8; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <header><h1>Semantic Webpage</h1></header>
        <nav><a href="#">Home</a><a href="#">Posts</a><a href="#">Contact</a></nav>
        <main>
            <section>
                <h2>Dog Facts</h2>
                <article>
                    <h3>Golden Retrievers</h3>
                    <p>They are highly intelligent and friendly.</p>
                </article>
            </section>
            <aside>
                <h3>Extra Fact</h3>
                <figure>
                    <img src="https://via.placeholder.com/150" alt="Dog">
                    <figcaption>Fig 1. A happy dog.</figcaption>
                </figure>
            </aside>
        </main>
        <footer><p>&copy; 2026 Semantic Form</p></footer>
    </div>
</body>
</html>
